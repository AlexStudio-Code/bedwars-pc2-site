<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена</title>
  <link rel="icon" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0c0f15;
      --text: #ffffff;
      --text-muted: #a0b3d9;
      --accent: #5b8cff;
      --accent-pink: #ff6b9d;
      --border: #2a3442;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }

    .home-link {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 10px 30px rgba(91, 140, 255, 0.3);
    }

    .home-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(91, 140, 255, 0.5);
    }

    @media (max-width: 480px) {
      .error-code {
        font-size: 6rem;
      }
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Страница не найдена</h1>
    <p>Такой страницы не существует или она была перемещена</p>
    <a href="/" class="home-link">Вернуться на главную</a>
  </div>
</body>
</html>
